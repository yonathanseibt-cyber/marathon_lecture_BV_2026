<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marathon de lecture du Belvédère 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #3498db;
      color: white;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #7f8c8d;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Marathon de lecture du Belvédère 2026</h1>

    <table id="classement">
      <thead>
        <tr>
          <th>Position</th>
          <th>Classe</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        <!-- Tu peux modifier les données ici -->
        <tr>
          <td>4</td>
          <td>Classe 5A</td>
          <td>1 pts</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Classe 6B</td>
          <td>350 pts</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Classe 4C</td>
          <td>15 pts</td>
        </tr>
        <tr>
          <td>1</td>
          <td>Classe 5A</td>
          <td>1000 pts</td>
        </tr>
      </tbody>
    </table>

    <div class="footer">
      Mise à jour quotidienne du classement en fin de journée
    </div>
  </div>

  <script>
    // Tri automatique du tableau par score
    function trierTableau() {
      const table = document.getElementById("classement").getElementsByTagName("tbody")[0];
      const lignes = Array.from(table.rows);

      lignes.sort((a, b) => {
        const scoreA = parseInt(a.cells[2].innerText);
        const scoreB = parseInt(b.cells[2].innerText);
        return scoreB - scoreA;
      });

      lignes.forEach((ligne, index) => {
        ligne.cells[0].innerText = index + 1;
        table.appendChild(ligne);
      });
    }

    trierTableau();
  </script>

</body>
</html>
